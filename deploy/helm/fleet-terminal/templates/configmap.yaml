apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fleet-terminal.fullname" . }}-config
  labels:
    {{- include "fleet-terminal.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  FLEET_REDIS_URL: {{ include "fleet-terminal.redisUrl" . | quote }}
