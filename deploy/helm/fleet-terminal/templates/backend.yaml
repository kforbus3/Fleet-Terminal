apiVersion: v1
kind: Service
metadata:
  name: {{ include "fleet-terminal.backend.fullname" . }}
  labels:
    {{- include "fleet-terminal.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- if .Values.backend.metrics.scrape }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.backend.metrics.port | quote }}
    prometheus.io/path: {{ .Values.backend.metrics.path | quote }}
  {{- end }}
spec:
  selector:
    {{- include "fleet-terminal.selectorLabels" (dict "context" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleet-terminal.backend.fullname" . }}
  labels:
    {{- include "fleet-terminal.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "fleet-terminal.selectorLabels" (dict "context" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fleet-terminal.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        # Roll pods when config/secret content changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.backend.metrics.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.backend.metrics.port | quote }}
        prometheus.io/path: {{ .Values.backend.metrics.path | quote }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: {{ include "fleet-terminal.backend.image" . | quote }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "fleet-terminal.fullname" . }}-config
            - secretRef:
                name: {{ include "fleet-terminal.secretName" . }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: recordings
              mountPath: {{ .Values.config.FLEET_RECORDING_DIR | quote }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: recordings
          {{- if .Values.backend.recordings.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "fleet-terminal.backend.fullname" . }}-recordings
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.backend.recordings.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "fleet-terminal.backend.fullname" . }}-recordings
  labels:
    {{- include "fleet-terminal.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.backend.recordings.persistence.storageClass }}
  storageClassName: {{ .Values.backend.recordings.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.backend.recordings.persistence.size | quote }}
{{- end }}
{{- if .Values.backend.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "fleet-terminal.backend.fullname" . }}
  labels:
    {{- include "fleet-terminal.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "fleet-terminal.backend.fullname" . }}
  minReplicas: {{ .Values.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.backend.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.backend.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.backend.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
