{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fleet-terminal.secretName" . }}
  labels:
    {{- include "fleet-terminal.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  FLEET_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  FLEET_CSRF_SECRET: {{ .Values.secrets.csrfSecret | quote }}
  FLEET_CA_PASSPHRASE: {{ .Values.secrets.caPassphrase | quote }}
  FLEET_DATABASE_URL: {{ include "fleet-terminal.databaseUrl" . | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  {{- end }}
{{- end }}
