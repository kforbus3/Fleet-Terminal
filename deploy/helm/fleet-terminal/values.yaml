# Default values for the fleet-terminal chart.
# Override with `-f my-values.yaml` or `--set key=value`.

nameOverride: ""
fullnameOverride: ""

# Cluster-wide image pull secrets (referenced by all workloads).
imagePullSecrets: []

# -- Backend (Go API + SSH gateway) ------------------------------------------
backend:
  replicaCount: 2
  image:
    repository: ghcr.io/fleet-terminal/backend
    tag: ""            # defaults to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  metrics:
    # Adds prometheus.io scrape annotations to Service + Pods.
    scrape: true
    port: 8080
    path: /metrics
  # Persistent storage for session recordings. When disabled an emptyDir is used.
  recordings:
    persistence:
      enabled: false
      size: 10Gi
      storageClass: ""

# -- Frontend (React SPA via nginx) ------------------------------------------
frontend:
  replicaCount: 2
  image:
    repository: ghcr.io/fleet-terminal/frontend
    tag: ""            # defaults to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

# -- Non-secret backend configuration (rendered into a ConfigMap) ------------
config:
  FLEET_ENV: "production"
  FLEET_HTTP_ADDR: ":8080"
  FLEET_PUBLIC_URL: "https://fleet.example.com"
  FLEET_COOKIE_SECURE: "true"
  FLEET_LOG_LEVEL: "info"
  FLEET_LOG_FORMAT: "json"
  FLEET_MIGRATE_ON_START: "true"
  FLEET_ALLOW_BOOTSTRAP: "false"
  FLEET_DB_MAX_CONNS: "20"
  FLEET_DB_MIN_CONNS: "2"
  FLEET_JUMP_HOST: "jumphost:22"
  FLEET_JUMP_USER: "fleet"
  FLEET_RECORDING_DIR: "/var/lib/fleet/recordings"

# -- Secrets ------------------------------------------------------------------
# If create=true, a Secret is rendered from the values below (use --set or a
# sealed/External Secret in production). If create=false, an existing Secret
# named `existingSecret` must provide the same keys.
secrets:
  create: true
  existingSecret: ""
  jwtSecret: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  csrfSecret: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  caPassphrase: "REPLACE_WITH_OPENSSL_RAND_HEX_32"

# -- PostgreSQL (in-chart single primary) ------------------------------------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: fleet
    database: fleet
    password: "REPLACE_WITH_STRONG_PASSWORD"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # When postgres.enabled=false, point the backend at an external database.
  externalDatabaseUrl: ""

# -- Redis (in-chart) --------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  url: "redis://{{ .Release.Name }}-redis:6379/0"
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Ingress ------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  host: fleet.example.com
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  tls:
    enabled: true
    secretName: fleet-tls
