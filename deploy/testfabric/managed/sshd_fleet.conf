# Fleet Terminal managed host sshd overrides (loaded first via Include).
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
PermitRootLogin no
# Trust certificates signed by the fleet user CA.
TrustedUserCAKeys /etc/ssh/fleet_ca.pub
# Allow a certificate carrying the 'fleet' principal to log in as user 'fleet'.
AuthorizedPrincipalsFile /etc/ssh/auth_principals/%u
