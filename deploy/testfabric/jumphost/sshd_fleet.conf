# Fleet Terminal jump host sshd overrides (loaded first via Include).
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
PermitRootLogin no
# Trust certificates signed by the fleet user CA.
TrustedUserCAKeys /etc/ssh/fleet_ca.pub
# Map the certificate principal to an allowed-principals file per user.
AuthorizedPrincipalsFile /etc/ssh/auth_principals/%u
# The jump host only forwards onward to managed hosts; no shell needed but
# allowed for debugging.
AllowTcpForwarding yes
