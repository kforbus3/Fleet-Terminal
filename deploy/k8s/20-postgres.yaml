# PostgreSQL — stateful primary for Fleet Terminal.
# Single-replica StatefulSet with a PVC template; for HA swap in an operator
# (CloudNativePG / Zalando) but the app only needs one writable endpoint.
apiVersion: v1
kind: Service
metadata:
  name: fleet-postgres
  namespace: fleet-terminal
  labels:
    app.kubernetes.io/name: fleet-terminal
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: fleet-terminal
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fleet-postgres
  namespace: fleet-terminal
  labels:
    app.kubernetes.io/name: fleet-terminal
    app.kubernetes.io/component: postgres
spec:
  serviceName: fleet-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-terminal
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-terminal
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "fleet"
            - name: POSTGRES_DB
              value: "fleet"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fleet-secrets
                  key: POSTGRES_PASSWORD
            # alpine image needs a writable data subdir under the mount.
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "fleet", "-d", "fleet"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "fleet", "-d", "fleet"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
