# TEMPLATE secret — DO NOT COMMIT REAL VALUES.
# Generate strong secrets before applying, e.g.:
#   kubectl -n fleet-terminal create secret generic fleet-secrets \
#     --from-literal=FLEET_JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=FLEET_CSRF_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=FLEET_CA_PASSPHRASE="$(openssl rand -hex 32)" \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 24)" \
#     --from-literal=FLEET_DATABASE_URL="postgres://fleet:CHANGE_ME@fleet-postgres:5432/fleet?sslmode=disable"
#
# The manifest below uses stringData with placeholders so it can be templated
# by a secrets manager (Sealed Secrets, External Secrets, SOPS, Vault, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: fleet-secrets
  namespace: fleet-terminal
  labels:
    app.kubernetes.io/name: fleet-terminal
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  FLEET_JWT_SECRET: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  FLEET_CSRF_SECRET: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  FLEET_CA_PASSPHRASE: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  # Must reference the same POSTGRES_PASSWORD value above.
  FLEET_DATABASE_URL: "postgres://fleet:REPLACE_WITH_STRONG_PASSWORD@fleet-postgres:5432/fleet?sslmode=disable"
