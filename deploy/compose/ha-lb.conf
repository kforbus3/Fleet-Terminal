# Minimal load balancer for the 2-instance HA test stack: round-robins across both
# backends with WebSocket support and passive health checks. Mounted into the nginx
# image's conf.d (included at http scope, so the `map` is valid here).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream fleet_backends {
    server backend1:8080 max_fails=2 fail_timeout=5s;
    server backend2:8080 max_fails=2 fail_timeout=5s;
}

server {
    listen 80;

    location / {
        proxy_pass http://fleet_backends;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Terminal / SFTP / RDP / events are WebSockets.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        # Retry the other backend if one is down/draining.
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
