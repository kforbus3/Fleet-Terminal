# Fleet Terminal — application stack.
# Brings up Postgres, Redis, the Go backend, and the React frontend.
# The local SSH test fabric (jump host + managed hosts) lives in the
# docker-compose.testfabric.yml override.

name: fleet-terminal

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleet}
      POSTGRES_DB: fleet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [fleet]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [fleet]

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        VERSION: ${FLEET_VERSION:-dev}
    restart: unless-stopped
    # Give the backend time to shut down gracefully on a deploy/restart so it
    # releases its Postgres leader advisory lock (and drains connections) before
    # SIGKILL — otherwise a stranded lock delays the next instance becoming leader
    # (the monitor only sweeps as leader). The incoming instance also reclaims a
    # stranded lock, but a clean handoff is instant.
    stop_grace_period: 30s
    environment:
      FLEET_ENV: ${FLEET_ENV:-development}
      # Server timezone — schedules compute their next run in this zone. Set TZ
      # in .env to your local zone (e.g. America/New_York) so "03:00" means your
      # 3 AM; defaults to UTC.
      TZ: ${TZ:-UTC}
      FLEET_HTTP_ADDR: ":8080"
      FLEET_PUBLIC_URL: ${FLEET_PUBLIC_URL:-http://localhost:8080}
      FLEET_DATABASE_URL: ${FLEET_DATABASE_URL:-postgres://fleet:${POSTGRES_PASSWORD:-fleet}@postgres:5432/fleet?sslmode=disable}
      FLEET_REDIS_URL: redis://redis:6379/0
      FLEET_JWT_SECRET: ${FLEET_JWT_SECRET:-}
      FLEET_CSRF_SECRET: ${FLEET_CSRF_SECRET:-}
      FLEET_CA_PASSPHRASE: ${FLEET_CA_PASSPHRASE:-}
      FLEET_VAULT_PASSPHRASE: ${FLEET_VAULT_PASSPHRASE:-}
      FLEET_BACKUP_PASSPHRASE: ${FLEET_BACKUP_PASSPHRASE:-}
      # External KMS/HSM for master-key protection (optional; default local). See docs/kms.md.
      FLEET_KMS_PROVIDER: ${FLEET_KMS_PROVIDER:-local}
      FLEET_KMS_KEY_ID: ${FLEET_KMS_KEY_ID:-}
      FLEET_KMS_VAULT_ADDR: ${FLEET_KMS_VAULT_ADDR:-}
      FLEET_KMS_VAULT_TOKEN: ${FLEET_KMS_VAULT_TOKEN:-}
      FLEET_KMS_AWS_REGION: ${FLEET_KMS_AWS_REGION:-}
      FLEET_KMS_AWS_ACCESS_KEY_ID: ${FLEET_KMS_AWS_ACCESS_KEY_ID:-}
      FLEET_KMS_AWS_SECRET_ACCESS_KEY: ${FLEET_KMS_AWS_SECRET_ACCESS_KEY:-}
      FLEET_KMS_AWS_ENDPOINT: ${FLEET_KMS_AWS_ENDPOINT:-}
      FLEET_KMS_AZURE_VAULT_URL: ${FLEET_KMS_AZURE_VAULT_URL:-}
      FLEET_KMS_AZURE_TENANT_ID: ${FLEET_KMS_AZURE_TENANT_ID:-}
      FLEET_KMS_AZURE_CLIENT_ID: ${FLEET_KMS_AZURE_CLIENT_ID:-}
      FLEET_KMS_AZURE_CLIENT_SECRET: ${FLEET_KMS_AZURE_CLIENT_SECRET:-}
      FLEET_KMS_GCP_CREDENTIALS_FILE: ${FLEET_KMS_GCP_CREDENTIALS_FILE:-}
      FLEET_CA_PASSPHRASE_WRAPPED: ${FLEET_CA_PASSPHRASE_WRAPPED:-}
      FLEET_VAULT_PASSPHRASE_WRAPPED: ${FLEET_VAULT_PASSPHRASE_WRAPPED:-}
      # External secrets manager (vault-of-record; optional). See docs/external-secrets.md.
      FLEET_EXTSECRET_VAULT_ADDR: ${FLEET_EXTSECRET_VAULT_ADDR:-}
      FLEET_EXTSECRET_VAULT_TOKEN: ${FLEET_EXTSECRET_VAULT_TOKEN:-}
      FLEET_EXTSECRET_VAULT_CACERT: ${FLEET_EXTSECRET_VAULT_CACERT:-}
      FLEET_EXTSECRET_VAULT_SKIP_VERIFY: ${FLEET_EXTSECRET_VAULT_SKIP_VERIFY:-}
      FLEET_COOKIE_SECURE: ${FLEET_COOKIE_SECURE:-false}
      FLEET_JUMP_HOST: ${FLEET_JUMP_HOST:-jumphost:22}
      FLEET_JUMP_USER: ${FLEET_JUMP_USER:-fleet}
      FLEET_JUMP_KNOWN_HOSTS: ${FLEET_JUMP_KNOWN_HOSTS:-}
      FLEET_SSH_INSECURE_HOST_KEYS: ${FLEET_SSH_INSECURE_HOST_KEYS:-}
      FLEET_TRUSTED_PROXIES: ${FLEET_TRUSTED_PROXIES:-}
      FLEET_CONTROL_PLANE_HOSTS: ${FLEET_CONTROL_PLANE_HOSTS:-}
      FLEET_REENCRYPT_SECRETS: ${FLEET_REENCRYPT_SECRETS:-}
      FLEET_HOST_SCOPED_ONLY: ${FLEET_HOST_SCOPED_ONLY:-}
      # Multi-tenancy (MSP mode). Off = byte-for-byte single-tenant. When enabled,
      # the app DB role MUST be non-superuser (and lack BYPASSRLS) or row-level
      # isolation is silently ineffective — Postgres superusers bypass RLS.
      FLEET_MULTI_TENANCY: ${FLEET_MULTI_TENANCY:-false}
      FLEET_RDP_COLLECT_FACTS: ${FLEET_RDP_COLLECT_FACTS:-}
      FLEET_RDP_WINRM_PORTS: ${FLEET_RDP_WINRM_PORTS:-}
      FLEET_RECORDING_DIR: /var/lib/fleet/recordings
      FLEET_ACTIVITY_RETENTION: ${FLEET_ACTIVITY_RETENTION:-}
      FLEET_AUDIT_RETENTION: ${FLEET_AUDIT_RETENTION:-}
      FLEET_MONITOR_CONCURRENCY: ${FLEET_MONITOR_CONCURRENCY:-}
      FLEET_SCAN_DIR: /var/lib/fleet/scans
      FLEET_SCAN_TIMEOUT: ${FLEET_SCAN_TIMEOUT:-60m}
      FLEET_VAULT_ROTATION_CHECK: ${FLEET_VAULT_ROTATION_CHECK:-30m}
      FLEET_SCAP_CONTENT_DIR: /var/lib/fleet/scap-content
      FLEET_SCAP_CONTENT_VERSION: ${FLEET_SCAP_CONTENT_VERSION:-}
      FLEET_ANSIBLE_RUNNER_URL: ${FLEET_ANSIBLE_RUNNER_URL:-http://ansible-runner:8000}
      FLEET_GRYPE_SCANNER_URL: ${FLEET_GRYPE_SCANNER_URL:-http://grype-scanner:8000}
      FLEET_MAX_UPLOAD_BYTES: ${FLEET_MAX_UPLOAD_BYTES:-5368709120}
      # WireGuard overlay — managed-host enrollment uses these. Empty falls back
      # to the binary's defaults (see .env.example). FLEET_WG_JUMP_ENDPOINT MUST
      # be set to a public/LAN address managed hosts can dial; FLEET_WG_INTERFACE
      # lets you avoid colliding with an existing wg0 on managed hosts.
      FLEET_WG_INTERFACE: ${FLEET_WG_INTERFACE:-}
      FLEET_WG_SUBNET: ${FLEET_WG_SUBNET:-}
      FLEET_WG_JUMP_IP: ${FLEET_WG_JUMP_IP:-}
      FLEET_WG_JUMP_ENDPOINT: ${FLEET_WG_JUMP_ENDPOINT:-}
      FLEET_WG_PORT: ${FLEET_WG_PORT:-}
      # Sessions, tokens, certificate lifetimes.
      FLEET_ACCESS_TOKEN_TTL: ${FLEET_ACCESS_TOKEN_TTL:-}
      FLEET_REFRESH_TOKEN_TTL: ${FLEET_REFRESH_TOKEN_TTL:-}
      FLEET_SESSION_IDLE_TTL: ${FLEET_SESSION_IDLE_TTL:-}
      FLEET_SESSION_ABSOLUTE_TTL: ${FLEET_SESSION_ABSOLUTE_TTL:-}
      FLEET_USER_CERT_TTL: ${FLEET_USER_CERT_TTL:-}
      FLEET_CERT_RENEW_BEFORE: ${FLEET_CERT_RENEW_BEFORE:-}
      FLEET_HOST_CERT_TTL: ${FLEET_HOST_CERT_TTL:-}
      FLEET_COOKIE_DOMAIN: ${FLEET_COOKIE_DOMAIN:-}
      # Per-IP rate limiting.
      FLEET_RATE_LIMIT_PER_MIN: ${FLEET_RATE_LIMIT_PER_MIN:-}
      FLEET_RATE_LIMIT_BURST: ${FLEET_RATE_LIMIT_BURST:-}
      FLEET_AUTH_RATE_LIMIT_PER_MIN: ${FLEET_AUTH_RATE_LIMIT_PER_MIN:-}
      FLEET_AUTH_RATE_LIMIT_BURST: ${FLEET_AUTH_RATE_LIMIT_BURST:-}
      # Bootstrap, MFA/WebAuthn (RPID/origins derive from PUBLIC_URL if empty).
      FLEET_ALLOW_BOOTSTRAP: ${FLEET_ALLOW_BOOTSTRAP:-}
      FLEET_WEBAUTHN_RPID: ${FLEET_WEBAUTHN_RPID:-}
      FLEET_WEBAUTHN_RP_NAME: ${FLEET_WEBAUTHN_RP_NAME:-}
      FLEET_WEBAUTHN_ORIGINS: ${FLEET_WEBAUTHN_ORIGINS:-}
      # Observability / DB pool.
      FLEET_LOG_LEVEL: ${FLEET_LOG_LEVEL:-}
      FLEET_LOG_FORMAT: ${FLEET_LOG_FORMAT:-}
      FLEET_TRACING: ${FLEET_TRACING:-}
      FLEET_OTLP_ENDPOINT: ${FLEET_OTLP_ENDPOINT:-}
      FLEET_DB_MAX_CONNS: ${FLEET_DB_MAX_CONNS:-}
      FLEET_DB_MIN_CONNS: ${FLEET_DB_MIN_CONNS:-}
    volumes:
      - recordings:/var/lib/fleet/recordings
      - scans:/var/lib/fleet/scans
      - scap-content:/var/lib/fleet/scap-content
      - backups:/var/lib/fleet/backups
      - rdp-drive:/var/lib/fleet/rdp-drive
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Bound to loopback: the frontend nginx reaches the backend over the internal
      # `fleet` network (proxy_pass http://backend:8080), so the published port is
      # only for local debugging. This keeps the unauthenticated /metrics, /health,
      # and /ready endpoints off any public interface. Front the API through nginx
      # (set FLEET_PUBLIC_URL to your domain) rather than exposing 8080 directly.
      - "127.0.0.1:8080:8080"
    networks: [fleet]

  frontend:
    build:
      # Context is the repo root (not frontend/) so the image build can reach
      # docs/, which the in-app help bundle is generated from at build time.
      context: ../..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE: ${FLEET_PUBLIC_URL:-http://localhost:8080}
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks: [fleet]

  # Sidecar that validates/lints (and, later, runs) Ansible playbooks for the
  # backend. Internal-only: not published on the host, reachable on the fleet
  # network at http://ansible-runner:8000.
  ansible-runner:
    build:
      context: ../ansible-runner
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [fleet]

  # Sidecar that runs Anchore Grype vulnerability scans for the backend. Internal
  # only, reachable at http://grype-scanner:8000. The vulnerability database is
  # fetched at runtime (online update or offline import) and persisted in the
  # grype-db volume — it is not baked into the image.
  grype-scanner:
    build:
      context: ../grype-scanner
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # How many grype scans run concurrently. grype is CPU/memory-heavy (it loads
      # the vuln DB per run), so a fleet-wide scan is bounded here rather than
      # serialized. Raise on a beefier host; keep low (1–2) on a small box.
      GRYPE_SCAN_CONCURRENCY: ${GRYPE_SCAN_CONCURRENCY:-2}
      # Per-scan wall-clock cap (seconds) before the scanner returns 504 "scan timed
      # out". Must be >= the time grype needs on your LARGEST host: a host with a big
      # package database (e.g. an ML/CUDA box with thousands of dpkg entries) can take
      # several minutes. Default 20m to match the backend's FLEET_VULN_SCAN_TIMEOUT so
      # the scanner never gives up before the backend would. Raise if a host still 504s.
      GRYPE_SCAN_TIMEOUT: ${GRYPE_SCAN_TIMEOUT:-1200}
      # Wall-clock cap (seconds) for a grype DB update/import (the ~1 GB vuln DB).
      GRYPE_DB_TIMEOUT: ${GRYPE_DB_TIMEOUT:-900}
    volumes:
      - grype-db:/home/scanner/.cache/grype
    networks: [fleet]

  # Apache Guacamole daemon: brokers RDP (and VNC) desktop sessions for the
  # backend. Internal only, reachable at guacd:4822. The backend tunnels the
  # target's RDP port to guacd through the jump host, so guacd only ever connects
  # back to the backend — it needs no direct route to managed hosts.
  #
  # guacd writes RDP session recordings into the shared `recordings` volume (under
  # /var/lib/fleet/recordings/rdp), which the backend serves back for replay, and
  # per-session redirected-drive files into the `rdp-drive` volume (for RDP file
  # transfer, cleaned up by the backend when the session ends). It runs as the
  # backend's `fleet` user (uid 100 / gid 101 from the backend image) so the backend
  # can read/remove the files guacd creates on those shared volumes.
  guacd:
    image: guacamole/guacd:1.5.5
    user: "100:101"
    # Running as an arbitrary uid leaves HOME as "/" (not writable), which breaks
    # FreeRDP's TLS/NLA setup ("home directory is not writable" → security negotiation
    # failures). Point HOME at a writable dir so FreeRDP can store its config/certs.
    environment:
      HOME: /tmp
    restart: unless-stopped
    volumes:
      - recordings:/var/lib/fleet/recordings
      - rdp-drive:/var/lib/fleet/rdp-drive
    networks: [fleet]

volumes:
  pgdata:
  redisdata:
  recordings:
  scans:
  scap-content:
  backups:
  grype-db:
  rdp-drive:

networks:
  fleet:
    driver: bridge
