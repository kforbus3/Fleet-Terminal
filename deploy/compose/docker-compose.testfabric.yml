# Fleet Terminal — local SSH test fabric override.
#
# Adds a jump host and two managed hosts (Ubuntu + Rocky) so the SSH path
# (backend -> jumphost:22 -> WireGuard overlay -> managed host) is fully
# demonstrable on macOS Docker Desktop, which has no WireGuard kernel module.
# Each node prefers the kernel WireGuard module and falls back to userspace
# wireguard-go over /dev/net/tun when the module is unavailable (as on Docker
# Desktop). On a Linux host with the wireguard module loaded, the kernel path is
# used automatically.
#
# Bring the whole stack up with:
#   docker compose -f deploy/compose/docker-compose.yml \
#                  -f deploy/compose/docker-compose.testfabric.yml up -d

name: fleet-terminal

services:
  # The test-fabric jump host and managed hosts are ephemeral containers whose
  # SSH host keys can change on rebuild, so accept-any host keys here. Production
  # (docker-compose.jumphost.yml / real deployments) leaves this off and verifies
  # host keys trust-on-first-use; the flag is refused when FLEET_ENV=production.
  backend:
    environment:
      FLEET_SSH_INSECURE_HOST_KEYS: "true"

  jumphost:
    build:
      context: ../testfabric/jumphost
      dockerfile: Dockerfile
    hostname: jumphost
    # Userspace WireGuard needs to manage the tun interface.
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      # Shared volume used to exchange WireGuard public keys between peers.
      - wgkeys:/wgkeys
    networks:
      fleet:
        ipv4_address: 172.30.0.10
    restart: unless-stopped

  host-ubuntu:
    build:
      context: ../testfabric/managed
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ubuntu:22.04
    hostname: host-ubuntu
    environment:
      WG_NAME: host-ubuntu
      WG_ADDRESS: 10.100.0.21/24
      JUMP_NAME: jumphost
      JUMP_WG_IP: 10.100.0.1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - wgkeys:/wgkeys
    depends_on:
      - jumphost
    networks:
      fleet:
        ipv4_address: 172.30.0.21
    restart: unless-stopped

  host-rocky:
    build:
      context: ../testfabric/managed
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: rockylinux:9
    hostname: host-rocky
    environment:
      WG_NAME: host-rocky
      WG_ADDRESS: 10.100.0.22/24
      JUMP_NAME: jumphost
      JUMP_WG_IP: 10.100.0.1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - wgkeys:/wgkeys
    depends_on:
      - jumphost
    networks:
      fleet:
        ipv4_address: 172.30.0.22
    restart: unless-stopped

volumes:
  # Holds each node's WireGuard public key (<name>.pub) for peer discovery.
  wgkeys:

networks:
  # Pin the existing 'fleet' bridge to a known subnet so the test fabric
  # nodes can use static-ish addressing on the Docker network.
  fleet:
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1
