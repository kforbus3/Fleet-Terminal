# Fleet Terminal — co-located jump host (single-server production).
#
# Overlay that adds the WireGuard "VPN server" / jump host to the app stack, so
# one host runs everything: database, cache, backend, frontend, and the jump
# host. Compose it WITH the base app file:
#
#   docker compose -f deploy/compose/docker-compose.yml \
#                  -f deploy/compose/docker-compose.jumphost.yml up -d
#
# (or `make up-single`). The jump host:
#   - publishes the WireGuard UDP port so remote managed hosts can reach it;
#   - auto-trusts the Fleet CA by polling the backend (FLEET_BACKEND_URL) — no
#     manual `make trust` step;
#   - persists its WireGuard keypair + peers and SSH host key on volumes, so
#     restarts/upgrades don't break enrolled hosts or known_hosts pinning.
#
# REQUIRED in .env for real (remote) managed hosts:
#   FLEET_WG_JUMP_ENDPOINT=<public-host-or-ip>:51820   # what managed hosts dial
# Open that UDP port on the host firewall. The backend reaches the jump host
# internally at jumphost:22 (its default FLEET_JUMP_HOST).
services:
  jumphost:
    build:
      context: ../testfabric/jumphost
      dockerfile: Dockerfile
    hostname: jumphost
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      # Self-establish + maintain CA trust from the backend (internal network).
      FLEET_BACKEND_URL: http://backend:8080
      WG_INTERFACE: ${FLEET_WG_INTERFACE:-wg0}
      WG_PORT: ${FLEET_WG_PORT:-51820}
      WG_ADDRESS: ${FLEET_WG_JUMP_IP:-10.100.0.1}/24
    ports:
      # Public WireGuard ingress: managed hosts dial this (UDP). Match the host
      # part of FLEET_WG_JUMP_ENDPOINT and open it on the firewall.
      - "${FLEET_WG_PORT:-51820}:51820/udp"
    volumes:
      - jump_wg:/etc/wireguard      # WireGuard keypair + persisted peers
      - jump_ssh:/etc/ssh/keys      # stable SSH host key (known_hosts pinning)
    depends_on:
      - backend
    networks: [fleet]
    restart: unless-stopped

volumes:
  jump_wg:
  jump_ssh:
