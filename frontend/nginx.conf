# nginx serves the SPA and proxies API + WebSocket traffic to the backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (CSP is intentionally strict; adjust if adding CDNs).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # API + WebSocket proxy.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        # Allow large SFTP transfers; the backend enforces the real cap
        # (FLEET_MAX_UPLOAD_BYTES). Stream uploads instead of buffering to disk.
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location = /health { proxy_pass http://backend:8080/health; }
    location = /version { proxy_pass http://backend:8080/version; }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
